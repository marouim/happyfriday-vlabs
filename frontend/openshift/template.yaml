apiVersion: template.openshift.io/v1
kind: Template
metadata:
  name: virtual-labs-frontend-s2i
  annotations:
    description: Build and deploy the Virtual Labs Vue frontend with Node.js S2I.
parameters:
  - name: APPLICATION_NAME
    description: Name applied to OpenShift resources.
    value: virtual-labs-frontend
  - name: SOURCE_REPOSITORY_URL
    description: Git repository URL containing this frontend source.
    required: true
  - name: SOURCE_REPOSITORY_REF
    description: Git branch, tag, or commit to build.
    value: main
  - name: CONTEXT_DIR
    description: Directory containing package.json when this frontend is in a larger repository.
    value: .
  - name: BACKEND_BASE_URL
    description: Public HTTPS origin of the independently deployed backend route, without a trailing slash.
    required: true
  - name: NODEJS_IMAGE_TAG
    description: Node.js S2I ImageStreamTag available in the openshift namespace.
    value: nodejs:20-ubi8
objects:
  - apiVersion: image.openshift.io/v1
    kind: ImageStream
    metadata:
      name: ${APPLICATION_NAME}

  - apiVersion: build.openshift.io/v1
    kind: BuildConfig
    metadata:
      name: ${APPLICATION_NAME}
      labels:
        app: ${APPLICATION_NAME}
    spec:
      source:
        type: Git
        git:
          uri: ${SOURCE_REPOSITORY_URL}
          ref: ${SOURCE_REPOSITORY_REF}
        contextDir: ${CONTEXT_DIR}
      strategy:
        type: Source
        sourceStrategy:
          from:
            kind: ImageStreamTag
            namespace: openshift
            name: ${NODEJS_IMAGE_TAG}
          env:
            - name: VITE_API_BASE_URL
              value: ${BACKEND_BASE_URL}
      output:
        to:
          kind: ImageStreamTag
          name: ${APPLICATION_NAME}:latest
      triggers:
        - type: ConfigChange
        - type: ImageChange

  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: ${APPLICATION_NAME}
      labels:
        app: ${APPLICATION_NAME}
      annotations:
        image.openshift.io/triggers: >-
          [{"from":{"kind":"ImageStreamTag","name":"${APPLICATION_NAME}:latest"},"fieldPath":"spec.template.spec.containers[?(@.name==\"${APPLICATION_NAME}\")].image"}]
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: ${APPLICATION_NAME}
      template:
        metadata:
          labels:
            app: ${APPLICATION_NAME}
        spec:
          containers:
            - name: ${APPLICATION_NAME}
              image: ${APPLICATION_NAME}:latest
              ports:
                - name: http
                  containerPort: 8080
              env:
                - name: PORT
                  value: "8080"
              readinessProbe:
                httpGet:
                  path: /
                  port: http
              livenessProbe:
                httpGet:
                  path: /
                  port: http
                initialDelaySeconds: 10
  - apiVersion: v1
    kind: Service
    metadata:
      name: ${APPLICATION_NAME}
      labels:
        app: ${APPLICATION_NAME}
    spec:
      selector:
        app: ${APPLICATION_NAME}
      ports:
        - name: http
          port: 8080
          targetPort: http

  - apiVersion: route.openshift.io/v1
    kind: Route
    metadata:
      name: ${APPLICATION_NAME}
      labels:
        app: ${APPLICATION_NAME}
    spec:
      to:
        kind: Service
        name: ${APPLICATION_NAME}
      port:
        targetPort: http
      tls:
        termination: edge
        insecureEdgeTerminationPolicy: Redirect
