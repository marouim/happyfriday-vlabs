apiVersion: template.openshift.io/v1
kind: Template
metadata:
  name: virtual-labs-backend-s2i
  annotations:
    description: Build and deploy the Virtual Labs Flask backend with Python S2I.
parameters:
  - name: APPLICATION_NAME
    description: Name applied to OpenShift resources.
    value: virtual-labs-backend
  - name: SOURCE_REPOSITORY_URL
    description: Git repository URL containing this backend source.
    required: true
  - name: SOURCE_REPOSITORY_REF
    description: Git branch, tag, or commit to build.
    value: main
  - name: CONTEXT_DIR
    description: Directory containing requirements.txt when this backend is in a larger repository.
    value: .
  - name: PYTHON_IMAGE_TAG
    description: Python S2I ImageStreamTag available in the openshift namespace.
    value: python:3.12-ubi8
  - name: AAP_BASE_URL
    description: Base URL for Ansible Automation Platform.
    value: https://appurl.com
  - name: AAP_TOKEN
    description: AAP bearer token created through the AAP platform gateway tokens endpoint.
    required: true
objects:
  - apiVersion: v1
    kind: ConfigMap
    metadata:
      name: ${APPLICATION_NAME}-aap-config
      labels:
        app: ${APPLICATION_NAME}
    data:
      AAP_BASE_URL: ${AAP_BASE_URL}
      AAP_REQUEST_TIMEOUT: "30"
      AAP_VERIFY_SSL: "true"

  - apiVersion: v1
    kind: Secret
    metadata:
      name: ${APPLICATION_NAME}-aap-secret
      labels:
        app: ${APPLICATION_NAME}
    stringData:
      AAP_TOKEN: ${AAP_TOKEN}

  - apiVersion: image.openshift.io/v1
    kind: ImageStream
    metadata:
      name: ${APPLICATION_NAME}

  - apiVersion: build.openshift.io/v1
    kind: BuildConfig
    metadata:
      name: ${APPLICATION_NAME}
      labels:
        app: ${APPLICATION_NAME}
    spec:
      source:
        type: Git
        git:
          uri: ${SOURCE_REPOSITORY_URL}
          ref: ${SOURCE_REPOSITORY_REF}
        contextDir: ${CONTEXT_DIR}
      strategy:
        type: Source
        sourceStrategy:
          from:
            kind: ImageStreamTag
            namespace: openshift
            name: ${PYTHON_IMAGE_TAG}
      output:
        to:
          kind: ImageStreamTag
          name: ${APPLICATION_NAME}:latest
      triggers:
        - type: ConfigChange
        - type: ImageChange

  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: ${APPLICATION_NAME}
      labels:
        app: ${APPLICATION_NAME}
      annotations:
        image.openshift.io/triggers: >-
          [{"from":{"kind":"ImageStreamTag","name":"${APPLICATION_NAME}:latest"},"fieldPath":"spec.template.spec.containers[?(@.name==\"${APPLICATION_NAME}\")].image"}]
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: ${APPLICATION_NAME}
      template:
        metadata:
          labels:
            app: ${APPLICATION_NAME}
        spec:
          containers:
            - name: ${APPLICATION_NAME}
              image: ${APPLICATION_NAME}:latest
              ports:
                - name: http
                  containerPort: 8080
              env:
                - name: PORT
                  value: "8080"
                - name: DB_HOST
                  value: postgresql
                - name: DB_PORT
                  value: "5432"
                - name: POSTGRES_DB
                  valueFrom:
                    secretKeyRef:
                      name: postgresql-credentials
                      key: POSTGRES_DB
                - name: POSTGRES_USER
                  valueFrom:
                    secretKeyRef:
                      name: postgresql-credentials
                      key: POSTGRES_USER
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgresql-credentials
                      key: POSTGRES_PASSWORD
                - name: AAP_BASE_URL
                  valueFrom:
                    configMapKeyRef:
                      name: ${APPLICATION_NAME}-aap-config
                      key: AAP_BASE_URL
                - name: AAP_REQUEST_TIMEOUT
                  valueFrom:
                    configMapKeyRef:
                      name: ${APPLICATION_NAME}-aap-config
                      key: AAP_REQUEST_TIMEOUT
                - name: AAP_VERIFY_SSL
                  valueFrom:
                    configMapKeyRef:
                      name: ${APPLICATION_NAME}-aap-config
                      key: AAP_VERIFY_SSL
                - name: AAP_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: ${APPLICATION_NAME}-aap-secret
                      key: AAP_TOKEN
              readinessProbe:
                httpGet:
                  path: /api/vlabs
                  port: http
              livenessProbe:
                httpGet:
                  path: /api/vlabs
                  port: http
                initialDelaySeconds: 10

  - apiVersion: v1
    kind: Service
    metadata:
      name: ${APPLICATION_NAME}
      labels:
        app: ${APPLICATION_NAME}
    spec:
      selector:
        app: ${APPLICATION_NAME}
      ports:
        - name: http
          port: 8080
          targetPort: http

  - apiVersion: route.openshift.io/v1
    kind: Route
    metadata:
      name: ${APPLICATION_NAME}
      labels:
        app: ${APPLICATION_NAME}
    spec:
      to:
        kind: Service
        name: ${APPLICATION_NAME}
      port:
        targetPort: http
      tls:
        termination: edge
        insecureEdgeTerminationPolicy: Redirect
