---
- name: Delete a Kubernetes namespace
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Require a target namespace
      ansible.builtin.assert:
        that:
          - deployment_namespace is defined
          - deployment_namespace | length > 0
        fail_msg: "Provide the namespace with -e deployment_namespace=<namespace>."

    - name: Delete Kubernetes namespace
      kubernetes.core.k8s:
        state: absent
        api_version: v1
        kind: Namespace
        name: "{{ deployment_namespace }}"
        wait: true
